name: Publish Gradlezilla Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with 'v' (e.g., v1.0.0, v1.0.0-alpha)

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build Distribution Archive
        run: ./gradlew :cli:distZip

      - name: Generate SHA-256 Checksum
        run: |
          cd cli/build/distributions/
          mv *.zip gradlezilla.zip
          shasum -a 256 gradlezilla.zip > gradlezilla.zip.sha256
          echo "Generated Checksum:"
          cat gradlezilla.zip.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cli/build/distributions/gradlezilla.zip
            cli/build/distributions/gradlezilla.zip.sha256

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v6
        with:
          repository: kaijutools/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew Formula
        run: |
          # 1. Extract the version tag (e.g., 'v1.0.0-alpha') and the SHA hash
          VERSION=${GITHUB_REF#refs/tags/}
          SHA256=$(cat cli/build/distributions/gradlezilla.zip.sha256 | awk '{print $1}')
          
          # 2. Construct the new download URL
          NEW_URL="https://github.com/kaijutools/gradlezilla/releases/download/$VERSION/gradlezilla.zip"

          echo "Bumping Homebrew formula to $VERSION with SHA $SHA256"

          # 3. Update the Ruby formula using sed (stream editor)
          cd homebrew-tap/Formula
          
          # macOS/Linux compatible sed commands to replace the url and sha lines
          sed -i.bak -e "s|url \".*\"|url \"$NEW_URL\"|" gradlezilla.rb
          sed -i.bak -e "s|sha256 \".*\"|sha256 \"$SHA256\"|" gradlezilla.rb
          rm gradlezilla.rb.bak # Cleanup the backup file

          # 4. Commit and Push back to the tap repository
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradlezilla.rb
          
          # Only commit if something actually changed
          if ! git diff --staged --quiet; then
            git commit -m "Bump Gradlezilla to $VERSION"
            git push
            echo "✅ Homebrew Tap updated successfully!"
          else
            echo "No changes needed in Homebrew tap."
          fi